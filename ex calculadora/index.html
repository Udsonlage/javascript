<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding: 0;
            margin: 0;
        }

        body {
            margin: auto;
            width: 100%;
            height: 100%;
        }

        section {
            border-radius: 10px;
            background-color: black;
            width: 400px;
            height: 600px;
            margin: auto;
        }

        #calcprincipal {
            text-align: end;
        }

        #calcnum {
            display: grid;
            grid-template-columns: 4, 1fr;
            gap: 10px;
            padding: 10px;
            margin: 10px 10px 10px 30px;
        }

        button {
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .teclacinza {
            background-color: rgb(70, 70, 70);
        }

        .teclapreta {
            background-color: rgb(33, 33, 33);
        }

        .teclalaranja {
            background-color: orangered;
        }

        #nome p {
            font-size: 2rem;
            padding: 10px 35px 10px 10px;
        }
        #display {
            font-size: 2rem;
            padding: 10px 35px 10px 10px;
        }
    </style>
</head>
<body>
    <section id="calculadora">
        <div id="calcprincipal">
            <div id="nome">
                <p>Calculadora</p>
            </div>
            <div id="display">0</div>
        </div>

        <div id="calcnum">
            <div>
                <button id="ac" class="teclacinza">AC</button>
                <button id="maisoumenos" class="teclacinza">/</button>
                <button id="porcentagem" class="teclacinza">%</button>
                <button id="divisao" class="teclalaranja">÷</button>
            </div>

            <div>
                <button id="t7" class="teclapreta">7</button>
                <button id="t8" class="teclapreta">8</button>
                <button id="t9" class="teclapreta">9</button>
                <button id="multiplicacao" class="teclalaranja">x</button>
            </div>

            <div>
                <button id="t4" class="teclapreta">4</button>
                <button id="t5" class="teclapreta">5</button>
                <button id="t6" class="teclapreta">6</button>
                <button id="substracao" class="teclalaranja">-</button>
            </div>

            <div>
                <button id="t1" class="teclapreta">1</button>
                <button id="t2" class="teclapreta">2</button>
                <button id="t3" class="teclapreta">3</button>
                <button id="soma" class="teclalaranja">+</button>
            </div>

            <div>
                <button id="naosei" class="teclapreta">n</button>
                <button id="t0" class="teclapreta">0</button>
                <button id="virgula" class="teclapreta">,</button>
                <button id="igual" class="teclalaranja">=</button>
            </div>
        </div>
    </section>
</body>
</html>
