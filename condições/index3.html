<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Sistema de multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="verificar" onclick="calcular()">
    <div id="res"></div>
    <script>
        var txtv = window.document.querySelector('#txtvel')
        var res = document.querySelector('#res')
        function calcular() {
            var vel = Number(txtvel.value)
            res.innerHTML = `<p>Sua velocidade é de <strong>${vel}km/h.</strong></p>`

            if (vel > 60) {
                res.innerHTML += 'Você está acima da velocidade, será <strong>MULTADO!</strong>' //O += no código vira concatenação 
            }
        }
    </script>
</body>
</html>
