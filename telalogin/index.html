<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <head>
        <img src="midia/Logo Horizontal Grafite e Laranja.png" alt="image/png">
    </head>
    <main>
        <form action="" id="form">
            <p>
                <label for="iusuario">Usuário:</label>
            </p>
            <p>
                <input type="text" name="usuario" id="iusuario" class="input" placeholder="Usuário">
            </p>

            <p>
                <label for="isenha">Senha:</label>
            </p>
            <p>
                <input type="password" name="senha" id="isenha" class="input" placeholder="Senha">
            </p>
            <p>
                <input type="button" value="Enviar" id="button" class="button">
            </p>
        </form>
    </main>
</body>
<script src="script.js"></script>
</html>
