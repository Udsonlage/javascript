<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de dia</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(248, 248, 189);
        }

        h1 {
            text-align: center;
            color: black;
        }

        main {
            width: 80%;
            text-align: center;
            background-color: white;
            border-radius: 20px;
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.189);
            padding-top: 10px;
            padding-bottom: 20px;
            margin: auto;

        }

        #img {
            width: 400px;
            height: 400px;
            background-color: aqua;
            text-align: center;
            border-radius: 50%;
            margin: auto;
            overflow: hidden;
        }

        #img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            
            text-align: center;
            
        }

        #imgmanha {
            display: block;
        }

        #imgtarde {
            display: none;
        }

        #imgnoite {
            display: none;
        }

        footer h3 {
            font-weight: lighter;
            text-align: center;
        }

    </style>
</head>
<body id="body">
    <header>
        <h1 id="titulo">Hora do dia</h1>
    </header>
    <main>
        <h3 id="subdia">Agora são 9 horas.</h3>
        <div id="img">
            <img src="midia/manha.jpg" alt="manha" id="imgmanha">
            <img src="midia/tarde.jpg" alt="tarde" id="imgtarde">
            <img src="midia/noite.jpg" alt="noite" id="imgnoite">
        </div>
    </main>
    <footer>
        <h3><em id="rodape">Exercício</em></h3>
    </footer>
    <script>
        var fundo = document.querySelector('body')
        var subdia = document.querySelector('#subdia')
        var imagemdia = document.querySelector('#imgmanha')
        var imagemtarde = document.querySelector('#imgtarde')
        var imagemnoite = document.querySelector('#imgnoite')
        var hora = 11
        


        if (hora >= 12 && hora <= 17) {
            body.style.backgroundColor = 'orange'
            subdia.innerHTML = `Agora são ${hora} horas.`
            imagemdia.style.display = 'none'
            imagemtarde.style.display = 'block'  
        } else if (hora >= 18) {
            let titulo = document.querySelector('#titulo')
            let rodape = document.querySelector('#rodape')

            body.style.backgroundColor = 'darkblue'
            titulo.style.color = 'white'
            subdia.innerHTML = `Agora são ${hora} horas.`
            imagemdia.style.display = 'none'
            imagemnoite.style.display = 'block'
            rodape.style.color = 'white'
        } else {
            subdia.innerHTML = (`Agora são ${hora} horas.`)
        }

        
    </script>
</body>
</html>
