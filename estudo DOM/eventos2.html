<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txtn1" id="txtn1">
    <input type="number" name="txtn2" id="txtn2">
    <input type="button" value="somar" onclick="somar()">
    <div id="res">Resultado</div>
    <script>
        function somar() {
            var tn1 = window.document.getElementById('txtn1')
            var tn2 = window.document.getElementById('txtn2')
            var res = window.document.querySelector("#res")
            var n1 = Number(tn1.value) //convertendo string em number pra somar
            var n2 = Number(tn2.value)// .value é a informação que é colocada dentro do input.
            var s = n1 + n2 //depois de virar number, podemos somar os dois
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a: ${s}` //ele vai acrescentar esse conteúdo entre `` no HTML com a id="res".

        }
    </script>
</body>
</html>
