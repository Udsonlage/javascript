<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #area {
            font-family: Arial, Helvetica, sans-serif;
            background-color: green;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        Interaja...
    </div>
    <script>
        var a = window.document.getElementById('area') //fora do bloco, ele funciona para todas as functions. Dentro de uma function, ele funciona apenas para a function que foi inserida.
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair) //Usando o addEventListener, não preciso colocar o script dentro da div, no HTML.

        function clicar() {
            a.innerText = 'Clicou!'
            a.style.backgroundColor = 'red'
        }
        function entrar() {
            a.innerText = 'Entrou!'
        }
        function sair() {
            a.innerText = 'saiu!'
            a.style.backgroundColor = 'green'
        }
    </script>
</body>
</html>

<!--
    Evento

    É evento é uma ação feita dentro do site.
    Ex.: Clique do mouse em um botão é um evento.

    Função

    É um conjunto de códigos que vão ser executados apenas se o evento acontecer.

    geralmente são chamados de bloco.
    Ex.: function ação(parâmetro) {
        códigos
    }
    
    o function é o que define um bloco. O bloco fica dentro das chaves {}. O function é seguido de uma ação. O parâmetro podemos definir


-->
