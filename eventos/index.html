<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            padding: 0;
            margin: 0;
        }

        div {
            text-align: center;
            background-color: darkgray;
            width: 300px;
            padding: 5px;
            border-radius: 5px;
            border: 4px solid black;
            margin: 5px;
        }

        .escuro {
            color: white;
            background-color: grey;
        }

        div:hover, .escuro:hover {
            border-color: red;
        }

        .destaque {
            color: white;
            background-color: darkred;
        }
    </style>
</head>
<body>
    <main>
        <div id="html">HTML</div>
        <div>CSS</div>
        <div>JavaScript</div>
        <div>PHP</div>
        <div>React</div>
        <div>MySQL</div>
        <div class="escuro">C++</div>
        <div class="escuro">C#</div>
        <div class="escuro">Arduino</div>
        <div class="escuro">React Native</div>
        <div class="escuro">Python</div>
        <div class="escuro">Raspberry</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
